<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── Primary Browser Tab Title ──────────────────────────────────────
         56 characters: brand name first, then high-value keywords.
         Including "Silas Clergy" builds personal brand authority
         right inside the search results tab.
    ──────────────────────────────────────────────────────────────────── -->
    <title>ScriptureHub | Fun Bible Quizzes &amp; Secrets by Silas Clergy</title>

    <!-- ── SEO Meta Description ───────────────────────────────────────────
         158 characters — safely under Google's 160-character mobile limit.
         This is the paragraph people read in Google search results
         before deciding whether to click your link.

         What makes it work:
           • "1,000+" — a specific number builds trust and curiosity
           • "Offline" — a unique selling point competitors can't match
           • "Silas Clergy" — personal brand authority
           • "Answer now!" — a gentle call to action that mirrors
             the quiz experience users will find on the site
    ──────────────────────────────────────────────────────────────────── -->
    <meta
      name="description"
      content="Deepen your faith with 1,000+ interactive Bible quizzes and hidden scriptural secrets. Join Silas Clergy for a fun, scholarly journey—even offline. Answer now!"
    />

    <!-- ── Open Graph Tags (Facebook, WhatsApp, LinkedIn previews) ─────────
         When someone shares your link on social media, these tags control
         what the preview card looks like — title, description, and image.
    ──────────────────────────────────────────────────────────────────── -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="ScriptureHub | Fun Bible Quizzes &amp; Secrets by Silas Clergy" />
    <meta
      property="og:description"
      content="Deepen your faith with 1,000+ interactive Bible quizzes and hidden scriptural secrets. Join Silas Clergy for a fun, scholarly journey—even offline. Answer now!"
    />
    <meta property="og:url" content="https://scripturehub.com" />

    <!-- ── Twitter / X Card ────────────────────────────────────────────────
         Controls how your link looks when shared on Twitter / X.
    ──────────────────────────────────────────────────────────────────── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ScriptureHub | Fun Bible Quizzes &amp; Secrets by Silas Clergy" />
    <meta
      name="twitter:description"
      content="Deepen your faith with 1,000+ interactive Bible quizzes and hidden scriptural secrets. Join Silas Clergy for a fun, scholarly journey—even offline. Answer now!"
    />

    <!-- ── Favicon placeholder ────────────────────────────────────────────
         Replace /favicon.ico with your own icon file placed in the public/ folder.
    ──────────────────────────────────────────────────────────────────── -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  </head>
  <body>
    <!-- React mounts your entire app inside this single div -->
    <div id="root"></div>

    <!-- Vite injects the built JavaScript bundle here automatically -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
